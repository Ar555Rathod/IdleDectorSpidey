<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>Spidey Watch</h2>
  </div>
  
  <div class="control-group switch-group">
    <span>Enable Spidey</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider round"></span>
    </label>
  </div>

  <div class="control-group">
    <label for="timeoutSlider">Idle Timeout: <span id="timeoutLabel">60s</span></label>
    <input type="range" id="timeoutSlider" min="10" max="300" value="60">
  </div>

  <div class="control-group switch-group">
    <span>Web Sound Effects</span>
    <label class="switch">
      <input type="checkbox" id="soundToggle">
      <span class="slider round"></span>
    </label>
  </div>

  <div class="status">
    Status: <span id="statusLabel">Hanging around...</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
